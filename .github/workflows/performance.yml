name: Performance Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      - name: Start preview server
        run: npm run preview &
        shell: bash
        env:
          PORT: 4321

      - name: Wait for server
        run: sleep 10

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:4321
            http://localhost:4321/templates
            http://localhost:4321/rads
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_GITHUB_APP_ID: ${{ secrets.LHCI_GITHUB_APP_ID }}
          LHCI_GITHUB_APP_PRIVATE_KEY: ${{ secrets.LHCI_GITHUB_APP_PRIVATE_KEY }}

      - name: Export LH results as JSON
        if: always()
        run: |
          ls -la .lighthouseci/
          cat .lighthouseci/lhr-*.json > lhr-results.json
          
      - name: Upload LH results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: |
            .lighthouseci/
            lhr-results.json
          retention-days: 30